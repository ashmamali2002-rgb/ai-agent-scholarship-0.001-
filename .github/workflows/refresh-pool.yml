name: Refresh Scholarship Pool

# Refreshes the shared scholarship pool 4x/day.
# Times are in UTC. Pakistan (PKT) is UTC+5, so:
#   22:00 UTC = 03:00 PKT
#   04:00 UTC = 09:00 PKT
#   09:00 UTC = 14:00 PKT (2 PM)
#   15:00 UTC = 20:00 PKT (8 PM)
on:
  schedule:
    - cron: "0 22 * * *"   # 3 AM PKT
    - cron: "0 4 * * *"    # 9 AM PKT
    - cron: "0 9 * * *"    # 2 PM PKT
    - cron: "0 15 * * *"   # 8 PM PKT
  workflow_dispatch:        # allows a manual "Run workflow" button in GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pool refresh
        env:
          GETSCO_URL: ${{ secrets.GETSCO_URL }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
        run: |
          if [ -z "$GETSCO_URL" ] || [ -z "$REFRESH_SECRET" ]; then
            echo "::warning::Setup incomplete — add GETSCO_URL and REFRESH_SECRET in repo Settings -> Secrets -> Actions. Skipping refresh."
            exit 0
          fi
          echo "Refreshing scholarship pool..."
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            "$GETSCO_URL/api/scholarships/refresh-pool" \
            -H "x-refresh-token: $REFRESH_SECRET" \
            --max-time 170)
          echo "HTTP $code"
          cat /tmp/out.json
          if [ "$code" -ge 400 ]; then echo "Refresh failed"; exit 1; fi
